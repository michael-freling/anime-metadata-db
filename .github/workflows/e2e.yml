name: E2E

# The e2e tests download the real open-data sources over the network and run
# the full init -> build pipeline, so they catch upstream URL/source drift
# (like a moved release asset) on every PR.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: E2E (live sources)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run e2e tests (no mocks)
        run: go test -tags e2e -run E2E -timeout 15m ./...
