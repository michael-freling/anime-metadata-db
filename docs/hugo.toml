# Hugo configuration for the documentation site using the hugo-book theme.
baseURL = '/'
title = 'Documentation'
locale = 'en-us'

# The hugo-book theme is pulled in as a Hugo Module (see go.mod).
theme = ['github.com/alex-shpak/hugo-book']

# Book theme expects the section that holds the menu pages.
[params]
  # (Optional) Set the section root for the book menu. Default is "docs".
  BookSection = 'docs'

  # Enable the built-in search.
  BookSearch = true

  # Render a "table of contents" on each page.
  BookToC = true

[markup]
  [markup.goldmark.renderer]
    # Allow raw HTML in Markdown (needed by some theme shortcodes).
    unsafe = true
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 3

[module]
  [[module.imports]]
    path = 'github.com/alex-shpak/hugo-book'
