# Authored characters override (Fate). The builder fills names from Wikidata
# (CC0) via externalIds.wikidataId; the appearance graph and voice-actor links
# are authored. The build never accesses AniList/MAL (runtime-only).
staff:
  - id: ayako-kawasumi
    externalIds: { wikidataId: Q49566 }
characters:
  - id: artoria-pendragon
    externalIds: { wikidataId: Q4918886 } # Saber
    # Default cast across all appearances (one Character node, many series).
    voiceActors:
      - { staffId: ayako-kawasumi, language: ja }
    appearances:
      - { seriesId: fate-stay-night }
      - { seriesId: fate-zero }
