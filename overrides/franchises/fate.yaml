# Authored override (Fate) — a multi-storyline brand, so a Franchise wrapping
# several Series. Fate/Zero is one linear story (numbered); Fate/stay night
# adapts parallel routes, so it has no absoluteNumber and sorts by release date.
franchise:
  id: fate
  titles: { original: フェイト, translations: { en: Fate } }
  series:
    - id: fate-stay-night
      titles: { translations: { en: Fate/stay night } }
      seasons:
        - id: fsn-2006
          number: 1
          externalIds: { anilistId: 356 }
        - id: fsn-ubw
          titles: { translations: { en: Unlimited Blade Works } }
          number: 2
          externalIds: { anilistId: 20716 }
      movies:
        - id: fsn-hf-1
          titles: { translations: { en: Heaven's Feel I } }
          externalIds: { anilistId: 20724 }
    - id: fate-zero
      titles: { translations: { en: Fate/Zero } }
      seasons:
        - id: fz-s1
          number: 1
          part: 1
          externalIds: { anilistId: 10087 }
        - id: fz-s2
          number: 1
          part: 2
          externalIds: { anilistId: 11741 }
  # Release order is the default (derived from release dates); only the curated
  # in-universe order is stored.
  watchOrders:
    - name: Chronological
      entries:
        - { ref: fate-zero }
        - { ref: fate-stay-night }
numbered: [fate-zero]
